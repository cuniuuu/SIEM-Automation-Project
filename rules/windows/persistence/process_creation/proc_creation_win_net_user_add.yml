title: New User Created Via Net.EXE
id: cd219ff3-fa99-45d4-8380-a7d15116c6dc
related:
    - id: b9f0e6f5-09b4-4358-bae4-08408705bd5c
      type: similar
status: test
description: Identifies the creation of local users via the net.exe command.
references:
    - https://eqllib.readthedocs.io/en/latest/analytics/014c3f51-89c6-40f1-ac9c-5688f26090ab.html
    - https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1136.001/T1136.001.md
author: Endgame, JHasenbusch (adapted to Sigma for oscd.community)
date: 2018-10-30
modified: 2023-02-21
tags:
    - attack.persistence
    - attack.t1136.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        - Image|endswith:
              - '\net.exe'
              - '\net1.exe'
        - OriginalFileName:
              - 'net.exe'
              - 'net1.exe'
    selection_cli:
        CommandLine|contains|all:
            - 'user'
            - 'add'
    condition: all of selection_*
falsepositives:
    - Legitimate user creation.
    - Better use event IDs for user creation rather than command line rules.
level: medium
x_metadata:
  owner:
    team: Detection Engineering
    primary_contact: soc-detection@local
    slack_channel: "#soc-detections"
  status: testing
  severity: medium
  risk_score: 60
  attack:
    tactics:
    - persistence
    techniques:
    - T1136
  data_sources:
  - product: windows
    source: process_creation
    required: true
    notes: Need user creation command line logged.
  log_requirements:
  - field: process.command_line
    why: Needed to identify account creation parameters.
  false_positive_scenarios:
  - Legitimate account provisioning by IT administration.
  tuning_notes:
  - Exclude jump hosts or admin scripts with approved change ticket context.
  triage:
    entities:
    - host.name
    - user.name
    - process.command_line
    priority_questions:
    - Was the created user expected by provisioning workflow?
    - Was the new account added to privileged groups afterward?
    enrichment_queries:
    - Search for subsequent group membership change events.
  response_playbook:
    id: windows-local-user-create-response
    mode: semi_auto
    auto_actions:
    - create_case
    - notify_telegram
  validation:
    test_strategy: Execute controlled local user add and replay event.
    sample_log_path: samples/windows/persistence/process_creation/net_user_add.json
    expected_outcome: Rule triggers when local account creation command is observed.
    last_validated_at: 2026-07-10
  review:
    reviewer: lead.detection@local
    last_reviewed_at: 2026-07-10
    review_cycle_days: 30
  references_internal:
  - KB-DET-NETUSER-001
##
