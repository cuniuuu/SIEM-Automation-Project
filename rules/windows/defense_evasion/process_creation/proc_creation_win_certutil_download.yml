title: Suspicious Download Via Certutil.EXE
id: 19b08b1c-861d-4e75-a1ef-ea0c1baf202b
related:
- id: 13e6fe51-d478-4c7e-b0f2-6da9b400a829
  type: similar
status: test
description: Detects the execution of certutil with certain flags that allow the utility
  to download files.
references:
- https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/certutil
- https://forensicitguy.github.io/agenttesla-vba-certutil-download/
- https://news.sophos.com/en-us/2021/04/13/compromised-exchange-server-hosting-cryptojacker-targeting-other-exchange-servers/
- https://twitter.com/egre55/status/1087685529016193025
- https://lolbas-project.github.io/lolbas/Binaries/Certutil/
author: Florian Roth (Nextron Systems), Jonhnathan Ribeiro, oscd.community, Nasreddine
  Bencherchali (Nextron Systems)
date: 2023-02-15
tags:
- attack.defense-evasion
- attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \certutil.exe
  - OriginalFileName: CertUtil.exe
  selection_flags:
    CommandLine|contains:
    - 'urlcache '
    - 'verifyctl '
  selection_http:
    CommandLine|contains: http
  condition: all of selection_*
falsepositives:
- Unknown
level: medium
regression_tests_path: regression_data/rules/windows/process_creation/proc_creation_win_certutil_download/info.yml
x_metadata:
  owner:
    team: Detection Engineering
    primary_contact: soc-detection@local
    slack_channel: "#soc-detections"
  status: testing
  severity: medium
  risk_score: 60
  attack:
    tactics:
    - defense_evasion
    techniques:
    - T1027
  data_sources:
  - product: windows
    source: process_creation
    required: true
    notes: Need process command line visibility.
  log_requirements:
  - field: process.command_line
    why: Required to identify certutil download flags and URL.
  - field: process.name
    why: Needed to confirm certutil execution.
  false_positive_scenarios:
  - Approved certificate troubleshooting or administrative downloads.
  tuning_notes:
  - Exclude internal certificate management scripts if confirmed benign.
  triage:
    entities:
    - host.name
    - user.name
    - process.command_line
    priority_questions:
    - Does the URL point to an approved internal repository?
    - Was a file written and executed afterward?
    enrichment_queries:
    - Search URL or domain across historical events.
    - Retrieve file creation and child process events after certutil.
  response_playbook:
    id: windows-certutil-download-response
    mode: semi_auto
    auto_actions:
    - create_case
    - notify_telegram
  validation:
    test_strategy: Execute lab certutil download simulation and replay logs.
    sample_log_path: samples/windows/defense_evasion/process_creation/certutil_download.json
    expected_outcome: Rule triggers on certutil with download flags and HTTP target.
    last_validated_at: 2026-07-10
  review:
    reviewer: lead.detection@local
    last_reviewed_at: 2026-07-10
    review_cycle_days: 30
  references_internal:
  - KB-DET-CERTUTIL-001
