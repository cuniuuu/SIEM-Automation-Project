title: Security Privileges Enumeration Via Whoami.EXE
id: 97a80ec7-0e2f-4d05-9ef4-65760e634f6b
status: test
description: Detects a whoami.exe executed with the /priv command line flag instructing the tool to show all current user privileges. This is often used after a privilege escalation attempt.
references:
    - https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/whoami
author: Florian Roth (Nextron Systems)
date: 2021-05-05
modified: 2023-02-28
tags:
    - attack.privilege-escalation
    - attack.discovery
    - attack.t1033
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        - Image|endswith: '\whoami.exe'
        - OriginalFileName: 'whoami.exe'
    selection_cli:
        CommandLine|contains:
            - ' /priv'
            - ' -priv'
    condition: all of selection_*
falsepositives:
    - Unknown
level: high
x_metadata:
  owner:
    team: Detection Engineering
    primary_contact: soc-detection@local
    slack_channel: "#soc-detections"
  status: testing
  severity: high
  risk_score: 70
  attack:
    tactics:
    - discovery
    techniques:
    - T1033
  data_sources:
  - product: windows
    source: process_creation
    required: true
    notes: Need whoami command line arguments.
  log_requirements:
  - field: process.command_line
    why: Needed to identify privilege enumeration switches.
  false_positive_scenarios:
  - Troubleshooting by administrators and helpdesk engineers.
  tuning_notes:
  - Suppress for tightly scoped admin jump boxes if noise is persistent.
  triage:
    entities:
    - host.name
    - user.name
    - process.command_line
    priority_questions:
    - Was this preceded by suspicious execution or lateral movement?
    - Is the user normally privileged on this host?
    enrichment_queries:
    - Search same user for discovery sequence commands within 30m.
  response_playbook:
    id: windows-privilege-discovery-response
    mode: manual
    auto_actions:
    - create_case
  validation:
    test_strategy: Replay whoami /priv execution event in dev.
    sample_log_path: samples/windows/discovery/process_creation/whoami_priv.json
    expected_outcome: Rule triggers on privilege enumeration commands.
    last_validated_at: 2026-07-10
  review:
    reviewer: lead.detection@local
    last_reviewed_at: 2026-07-10
    review_cycle_days: 30
  references_internal:
  - KB-DET-WHOAMI-001
##
