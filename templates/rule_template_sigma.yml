title: Example Suspicious Process Creation
id: 11111111-1111-1111-1111-111111111111
status: test
description: Example Sigma rule template with operational metadata.
references:
  - https://example.local/reference
author: SOC Team
date: 2026-07-10
tags:
  - attack.execution
  - attack.t1059
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: \powershell.exe
  condition: selection
falsepositives:
  - Administrative automation
level: medium
x_metadata:
  owner:
    team: Detection Engineering
    primary_contact: soc-detection@local
    slack_channel: "#soc-detections"
  status: testing
  severity: medium
  risk_score: 55
  attack:
    tactics:
      - execution
    techniques:
      - T1059
  data_sources:
    - product: windows
      source: sysmon
      required: true
      notes: Need process command line enabled.
  log_requirements:
    - field: process.command_line
      why: Needed to identify suspicious execution context.
      example: powershell.exe -enc ...
  false_positive_scenarios:
    - Internal admin script execution
  tuning_notes:
    - Exclude signed admin automation path if repeatedly benign.
  triage:
    entities:
      - host.name
      - user.name
      - process.command_line
    priority_questions:
      - Is the host a privileged workstation or server?
      - Is the parent process expected for this user?
    enrichment_queries:
      - Search same user on same host in past 24h
      - Retrieve parent-child process tree
  response_playbook:
    id: windows-suspicious-process-triage
    mode: semi_auto
    auto_actions:
      - create_case
      - notify_telegram
  validation:
    test_strategy: Replay known suspicious sample into dev index.
    sample_log_path: samples/windows/process_creation/example.json
    expected_outcome: Rule triggers once per malicious sample.
    last_validated_at: 2026-07-10
  review:
    reviewer: lead.detection@local
    last_reviewed_at: 2026-07-10
    review_cycle_days: 30
  references_internal:
    - KB-DET-001
